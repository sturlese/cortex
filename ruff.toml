# Shared lint config for every Python package (pipeline/*).
line-length = 120
target-version = "py312"

[lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = [
  "SIM105",  # try/except/pass is fine for best-effort cleanup
  "SIM108",  # ternary is not always clearer
]

[lint.isort]
known-first-party = ["clean", "corpus", "graph", "answer", "slackexport", "benchmark"]

[lint.per-file-ignores]
"**/tests/*" = ["SIM115"]   # quick open().read()/.write() is fine in tests

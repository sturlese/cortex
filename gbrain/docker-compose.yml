# gbrain — the brain server: a multi-user MCP memory on Supabase, fronted by a
# Tailscale Funnel sidecar. (gbrain itself is an external project, pinned by SHA.)
#
# 3 containers / 2 images (+ optional ingest):
#   gbrain-serve     -> gbrain image, runs `gbrain serve --http`  (the MCP endpoint)
#   gbrain-autopilot -> SAME gbrain image, runs `gbrain autopilot` (background enrichment)
#   tailscale        -> official image, exposes a public :443 Funnel -> gbrain :3131
#   ingest           -> SAME gbrain image, loop: brain-md -> Supabase. profile "ingest".
#
# Variable substitution AND container env both read ./.env (see .env.example).

name: gbrain

services:
  gbrain-serve:
    build:
      context: .
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.10}
        GBRAIN_REF: ${GBRAIN_REF:-099d9a8f5505f1d64e4f4f784f8429cc2d47c18f}
    image: gbrain:local
    restart: unless-stopped
    env_file: .env
    # NO host ports published, on purpose: the ONLY public ingress is the Tailscale
    # Funnel (:443). gbrain stays private inside the container network namespace.
    command:
      - serve
      - --http
      - --bind
      - 0.0.0.0
      - --port
      - "3131"
      - --public-url
      - ${GBRAIN_PUBLIC_URL}
    volumes:
      - gbrain-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3131/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  gbrain-autopilot:
    image: gbrain:local
    restart: unless-stopped
    env_file: .env
    command: ["autopilot"]
    volumes:
      - gbrain-data:/data
    depends_on:
      gbrain-serve:
        condition: service_healthy

  tailscale:
    # Pin to a tested version (reproducibility). Bump deliberately.
    # Stable tags: https://hub.docker.com/r/tailscale/tailscale/tags
    image: tailscale/tailscale:v1.98.4
    restart: unless-stopped
    # Share gbrain-serve's network namespace so the Funnel proxies to 127.0.0.1:3131.
    # Most reliable sidecar pattern — no cross-container DNS in the tunnel path.
    network_mode: "service:gbrain-serve"
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME:-gbrain}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/funnel.json
      TS_ACCEPT_DNS: "false"   # don't let MagicDNS rewrite the shared netns resolv.conf
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale/funnel.json:/config/funnel.json:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      gbrain-serve:
        condition: service_healthy

  # ── ingest (OPTIONAL — does not auto-start) ────────────────────────────────
  # Loop: registers the corpus source once, then syncs it into the database
  # every GBRAIN_SYNC_INTERVAL seconds. The corpus is written by the pipeline
  # stack; this is the only bridge between the two stacks.
  # GBRAIN_SYNC_PATH picks which layer to index: /data/brain-md (default) or
  # /data/brain-md-graphed (if you run the graph stage and want wikilinks).
  # Start it with:  docker compose --profile ingest up -d ingest
  ingest:
    image: gbrain:local
    profiles: ["ingest"]
    restart: unless-stopped
    env_file: .env
    volumes:
      - gbrain-data:/data
      - brain-md:/data/brain-md:ro                   # SHARED with the pipeline stack (single writer: clean)
      - brain-md-graphed:/data/brain-md-graphed:ro   # derived graph layer (optional)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        SRC="${GBRAIN_SYNC_SOURCE:-brain}"
        SYNC_PATH="${GBRAIN_SYNC_PATH:-/data/brain-md}"
        gbrain sources add "$$SRC" --path "$$SYNC_PATH" 2>/dev/null || true
        while true; do
          gbrain sync --source "$$SRC" || echo "[ingest] sync failed; retrying next cycle"
          sleep "${GBRAIN_SYNC_INTERVAL:-1800}"
        done
    depends_on:
      gbrain-serve:
        condition: service_healthy

volumes:
  gbrain-data:   # gbrain local state (audit logs, pid). Light: the data lives in Supabase.
  ts-state:      # Tailscale node identity — MUST persist or it re-auths on every restart.
  brain-md:
    external: true   # SHARED with the pipeline stack. Create once: `docker volume create brain-md`
  brain-md-graphed:
    external: true   # derived graph layer. Create once: `docker volume create brain-md-graphed`
